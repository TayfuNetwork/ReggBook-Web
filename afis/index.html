<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReggBook Afiş İndir</title>
<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;
n=f.fbq=function(){
n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments)
};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', '4403577006598103');

fbq('track', 'PageView');

fbq('trackCustom', 'AfisDownloadPage', {
  source: 'afis_page'
});
</script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2fb;
      color: #2b2430;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .card {
      background: white;
      border-radius: 26px;
      padding: 36px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 18px;
      color: #6b3fc9;
    }

    p {
      font-size: 17px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      width: 82%;
      max-width: 260px;
      padding: 16px 20px;
      background: #7447c7;
      color: white;
      text-decoration: none;
      border-radius: 18px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(116,71,199,0.25);
      transition: 0.2s ease;
      margin: 0 auto;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .note {
      margin-top: 26px;
      font-size: 14px;
      color: #777;
      line-height: 1.5;
    }

    .preview-title {
      margin-top: 42px;
      margin-bottom: 18px;
      font-size: 18px;
      font-weight: bold;
      color: #5b3f8c;
    }

    .preview-image {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.10);
    }

    .footer {
      margin-top: 34px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>ReggBook Afişi Hazır</h1>

      <p>
        İşletmenizde müşterilerinizin görebileceği bir alana asmak için
        ReggBook afişini buradan indirebilirsiniz.
      </p>

      <a class="btn"
   href="Musteri.pdf"
   download
   onclick="fbq('trackCustom', 'AfisDownload', {
     source: 'pdf_button'
   });">
        Afişi İndir
      </a>

      <div class="note">
        PDF dosyasını indirip çıktı alarak işletmenizde kullanabilirsiniz.
      </div>

      <div class="preview-title">
        Önizleme
      </div>

      <img src="pdfview.png" alt="PDF Önizleme" class="preview-image">

    </div>

    <div class="footer">
      ReggBook • Randevu ve İşletme Yönetimi
    </div>

  </div>

</body>
</html>
