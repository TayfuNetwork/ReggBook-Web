<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReggBook Afiş İndir</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f2fb;
      color: #2b2430;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #5b3f8c;
    }

    p {
      font-size: 17px;
      line-height: 1.6;
      color: #555;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      padding: 16px 22px;
      background: #6f4bb2;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 6px 16px rgba(111,75,178,0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .note {
      margin-top: 22px;
      font-size: 14px;
      color: #777;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>ReggBook Afişi Hazır</h1>

      <p>
        İşletmenizde müşterilerinizin görebileceği bir alana asmak için
        ReggBook afişini buradan indirebilirsiniz.
      </p>

      <a class="btn" href="Musteri.pdf" download>
        Afişi İndir
      </a>

      <div class="note">
        PDF dosyasını indirip çıktı alarak işletmenizde kullanabilirsiniz.
      </div>
    </div>

    <div class="footer">
      ReggBook • Randevu ve İşletme Yönetimi
    </div>
  </div>
</body>
</html>
