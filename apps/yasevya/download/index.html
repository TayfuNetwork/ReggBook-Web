<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YasevYa İndir</title>

  <!-- Facebook Pixel -->
  <script>
  !function(f,b,e,v,n,t,s){
  if(f.fbq)return;
  n=f.fbq=function(){
  n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments)
  };
  if(!f._fbq)f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)
  }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

  fbq('init', '4403577006598103');

fbq('trackCustom', 'YasevYa-Download', {
  value: 1,

</script>

  <script>
    const PLAY_STORE_URL =
      "https://reggbook.com";

    const APP_STORE_URL =
      "https://apps.apple.com/tr/app/yasevya/id6777557830?l=tr";

    const WINDOWS_ZIP_URL =
      "https://reggbook.com";

    const FALLBACK_URL = "https://reggbook.com";

    let redirectUrl = FALLBACK_URL;
    let platformName = "uygun sayfaya";

    function detectPlatform() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      // Android
      if (/android/i.test(ua)) {
        redirectUrl = PLAY_STORE_URL;
        platformName = "Google Play Mağazası";
        return;
      }

      // iOS
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        redirectUrl = APP_STORE_URL;
        platformName = "Apple App Store";
        return;
      }

      // Windows
      if (/Windows NT/i.test(ua)) {
        redirectUrl = WINDOWS_ZIP_URL;
        platformName = "Windows sürümü";
        return;
      }

      // Diğer cihazlar
      redirectUrl = FALLBACK_URL;
      platformName = "ReggBook";
    }

    function startCountdown() {
      detectPlatform();

      const redirectText = document.getElementById("redirectText");
      const countdownEl = document.getElementById("countdown");

      redirectText.innerText =
        `${platformName} yönlendirmesi hazırlanıyor...`;

      let countdown = 3;
      countdownEl.innerText = countdown;

      const timer = setInterval(() => {
        countdown--;
        countdownEl.innerText = countdown;

        if (countdown <= 0) {
          clearInterval(timer);

          // Windows özel pixel eventi
          if (/Windows NT/i.test(navigator.userAgent)) {
            fbq('trackCustom', 'WindowsDesktopDownload');
          }

          window.location.replace(redirectUrl);
        }
      }, 1000);
    }

    window.onload = startCountdown;
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 35, 128, 0.22), transparent 38%),
        linear-gradient(145deg, #070513, #15081f 48%, #070513);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 22px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 34px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
    }

    .store-text {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.45;
      font-weight: 700;
      color: #ff6fb0;
      text-shadow: 0 0 18px rgba(255, 43, 128, 0.45);
    }

    .loader-gif {
      width: min(100%, 360px);
      height: auto;
      border-radius: 26px;
      box-shadow: 0 26px 80px rgba(255, 30, 130, 0.22);
      display: block;
    }

    .small {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.68);
    }

    .sr-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 29px;
      }

      .store-text {
        font-size: 16px;
      }

      .loader-gif {
        width: min(100%, 330px);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Ücretsiz Reklamsız İlişki Analizi</h1>

    <div class="store-text">
      Apple Store'ye yönlendiriliyorsunuz...
    </div>

    <img
  class="loader-gif"
  src="yasevya_telefon_geri_sayim_3_2_1.gif"
  alt="YasevYa geri sayım animasyonu"
/>

    <div class="small">
      Yönlendirme otomatik olarak yapılacaktır.
    </div>

    <div class="sr-hidden" id="redirectText">
      Mağaza yönlendirmesi hazırlanıyor...
    </div>

    <div class="sr-hidden" id="countdown">3</div>
  </div>
</body>
</html>
